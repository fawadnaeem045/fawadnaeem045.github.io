  <script>
    const navToggle = document.querySelector('.nav-toggle');
    const navLinks = document.querySelector('.nav-links');
    if (navToggle && navLinks) {
      navToggle.addEventListener('click', () => {
        const expanded = navToggle.getAttribute('aria-expanded') === 'true';
        navToggle.setAttribute('aria-expanded', (!expanded).toString());
        navLinks.classList.toggle('open');
        document.body.classList.toggle('nav-open');
      });
      navLinks.querySelectorAll('a').forEach(link => {
        link.addEventListener('click', () => {
          navLinks.classList.remove('open');
          navToggle.setAttribute('aria-expanded', 'false');
          document.body.classList.remove('nav-open');
        });
      });
    }

    const learningData = [
      {"title":"Advanced Node.js","summary":"fs.readFileSync under the hood, Exploring C++ code, fs.readFile under the hood, Threads and Processes, Node.js is multi-threaded, Threadpool Event loop, call stack, Web API, Task Queues, Microtask queues","date":"February 2022","image":"img/AdvancedNodejs.jpg","link":"https://drive.google.com/file/d/1hPWCdPiZck9pWw6D2_yABvwdBYzDuk1W/view"},
      {"title":"Become a Data Analyst","summary":"Data fluency exploring and describing data, Data visualization, Excel statistics essential, Excel data analysis, Python, SQL programming, Power BI essential, Tableau essential","date":"January 2021","image":"img/BecomeaDataAnalyst.jpg","link":"https://drive.google.com/file/d/1o9kVBn3WUnr030iQihKHRkv-BaXkj6qR/view?usp=share_link"},
      {"title":"Cloud Computing Basics Cloud 101","summary":"Cloud Economics and Computing as a Utility, Scalable Compute and Storage Services, Distributed Computing for Performance and Reliability, Managed Infrastructure, Azure Services and APIs, IaaS, PaaS, SaaS, FaaS","date":"December 2020","image":"img/CloudComputingBasicsCloud101.jpg","link":"https://coursera.org/share/ce1447bb5f497616fde47d652ac4575a"},
      {"title":"CloudSeekho Google Developers Season 2","summary":"Intermediate ML: TensorFlow on Google Cloud, NCAA March Madness: Bracketology with Google Cloud, BigQuery for Marketing Analysts, BigQuery Basics for Data Analysts, Intro to ML: Language Processing, Intro to ML: Image Processing","date":"October 2020","image":"img/CloudSeekhoGoogleDevelopersSeason2.jpg","link":"https://www.cloudskillsboost.google/public_profiles/e1a44f23-eca4-4e3e-8772-de731af883cd"},
      {"title":"CloudSeekho Google Developers Season 3","summary":"Create and manage cloud resources, Perform foundational infrastructure tasks in Google Cloud, Set up and configure a cloud environment, Serverless Firebase development, Serverless Cloud Run development","date":"May 2021","image":"img/CloudSeekhoGoogleDevelopersSeason3.jpg","link":"https://www.cloudskillsboost.google/public_profiles/e1a44f23-eca4-4e3e-8772-de731af883cd"},
      {"title":"NDG Linux Unhatched","summary":"Command line syntax, file navigation, regular expressions, awareness of common text editors, processes, networking, permissions, ownership","date":"March 2021","image":"img/NDGLinuxUnhatched.jpg","link":"https://drive.google.com/file/d/1qTbH5Gd0-WOjSFtwQxWfZydKbisPo6HA/view?usp=share_link"},
      {"title":"Python (Beyond The Basics)","summary":"F-Strings, *args and **kwargs, comprehensions, lambda functions, generators, classes and objects, decorators","date":"December 2022","image":"img/PythonBeyondTheBasics.JPG","link":"https://drive.google.com/file/d/1Bqf5xEBgtzOl_h6bRWKNkeXCybtqV7_0/view?usp=share_link"},
      {"title":"Salesforce For Developers Part I","summary":"Declarative programming vs custom development, validation rules, Lightning Flow, getting started with Apex","date":"December 2022","image":"img/SalesforceforDevelopers1.JPG","link":"https://drive.google.com/file/d/1yQWdNI1seMsAcXDtnYf8Iz_m8DjlcdDL/view?usp=share_link"},

      {"title":"Web Designing","summary":"Design best practices, color theory, minimal layouts, HTML, CSS, JavaScript","date":"January 2017","image":"img/WebDesigning.jpg","link":"https://drive.google.com/file/d/1gKBn6DlR9dLOBU_NEtz23lmitp3AJPGe/view?usp=share_link"}
    ];

    const learningGrid = document.getElementById('learning-grid');
    learningData.forEach(item => {
      const card = document.createElement('article');
      card.className = 'card learning-card';
      card.innerHTML = `
        <a href="${item.link}" target="_blank" rel="noopener" class="learning-link">
          <img src="${item.image}" alt="${item.title} certificate" loading="lazy">
        </a>
        <div class="project-body">
          <h3>${item.title}</h3>
          <p class="muted">${item.summary}</p>
          <p class="learning-meta">${item.date}</p>
          <a class="btn ghost small" href="${item.link}" target="_blank" rel="noopener">View credential</a>
        </div>
      `;
      learningGrid.appendChild(card);
    });

    const yearEl = document.getElementById('year');
    if (yearEl) yearEl.textContent = new Date().getFullYear();
  </script>
