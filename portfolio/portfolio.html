<body>

      <section class="hero sub-hero">

    <main id="main">
      <section class="section" id="projects">
        <div class="section-header">
          <h2>Recent builds and collaborations</h2>
        </div>
        <div class="card-grid" id="project-grid"></div>
      </section>
    </main>

    <footer class="site-footer">
      <a class="back-to-top" href="#top">Back to top</a>
    </footer>
  </div>

  <script>
    const navToggle = document.querySelector('.nav-toggle');
    const navLinks = document.querySelector('.nav-links');
    if (navToggle && navLinks) {
      navToggle.addEventListener('click', () => {
        const expanded = navToggle.getAttribute('aria-expanded') === 'true';
        navToggle.setAttribute('aria-expanded', (!expanded).toString());
        navLinks.classList.toggle('open');
        document.body.classList.toggle('nav-open');
      });
      navLinks.querySelectorAll('a').forEach(link => {
        link.addEventListener('click', () => {
          navLinks.classList.remove('open');
          navToggle.setAttribute('aria-expanded', 'false');
          document.body.classList.remove('nav-open');
        });
      });
    }

    const projectData = [
      {"title":"Candidate assessment platform","summary":"Contributed with team members on different functionality of the platform in MEAN stack","front":"","back":"","image":"img/assessment.png","link":""},
      {"title":"Authentication and authorization","summary":"Build an functionality of authentication and authorization of users using MERN stack.","front":"React.js 17","back":"Node.js, Express.js, Mongoose, MongoDB, JSONWebTokens","image":"img/authentication.png","link":"https://github.com/fawad4bros/MERN_Auth"},
      {"title":"E-commerce","summary":"E-commerce application with E-cart functionality build with MEAN stack and deployed on hetoku using CI/CD github action.","front":"Photoshop cc, Angular 13, Angular material UI","back":"Node.js, Express.js, Mongoose, MongoDB, Github actions, Heroku","image":"img/online-shop.png","link":"https://github.com/fawad4bros/Ecart"},
      {"title":"ERP application","summary":"Build separate modules to break down an existing ERP application into smaller modules and making changes according to client feedback and SQA team.","front":"","back":"","image":"img/erp.png","link":""},
      {"title":"Fast food application","summary":"A Fast food application with admin CRUD build with MEAN stack","front":"Photoshop cc, Angular 13, Angular material UI","back":"Node.js, Express.js, Mongoose, MongoDB","image":"img/restaurant.png","link":"https://github.com/fawad4bros/MEAN_restapp_CRUD"},
      {"title":"Firebase deployment","summary":"Application using firebase storage build with Angular 13.","front":"Angular 13","back":"Firebase","image":"img/database-storage.png","link":"https://github.com/fawad4bros/firebase_deployment"},
      {"title":"Freelance platform","summary":"Contributed with a team member on different functionality of the platform in MEAN stack","front":"","back":"","image":"img/freelance.png","link":""},
      {"title":"IDE","summary":"IDE for Python and Javascript language","front":"Angular 13, Nebular","back":"Node.js, Express.js, Bull queue, Socket.io, Redis","image":"img/text-editor.png","link":"https://github.com/fawad4bros/mean_ide"},
      {"title":"IVRs","summary":"Build an Interactive voice response system with functionality of voice mail and redirecting calls to customer service for better engagement with customers","front":"","back":"Node.js, Express.js, Twilio, Ngrok","image":"img/engagement.png","link":"https://github.com/fawad4bros/twilio"},
      {"title":"Job sheet application platform","summary":"Contributed with a team member on different functionality of the platform in LAMP stack","front":"","back":"","image":"img/jobsheet.png","link":""},
      {"title":"Pakistan vaping community","summary":"Build a community platform for vape enthusiastic using LAMP stack.","front":"HTML, CSS, Bootstrap, Javascript","back":"PHP, MySQL","image":"img/communities.png","link":"https://github.com/fawad4bros/PVC"},
      {"title":"To-do","summary":"Interface of To-do application build with Angular","front":"Angular 13","back":"","image":"img/to-do-list.png","link":"https://github.com/fawad4bros/angular-todo-app-main"},
      {"title":"Vehicle service application","summary":"Contributed on different functionality of the application in LAMP stack","front":"","back":"","image":"img/vehicleservice.png","link":""}
    ];

    const projectGrid = document.getElementById('project-grid');
    projectData.forEach(project => {
      const card = document.createElement('article');
      card.className = 'card project-card';
      const techSections = [];
      if (project.front) techSections.push(`<span><strong>Front-end:</strong> ${project.front}</span>`);
      if (project.back) techSections.push(`<span><strong>Back-end:</strong> ${project.back}</span>`);
      card.innerHTML = `
        <img src="${project.image}" alt="${project.title} preview" loading="lazy">
        <div class="project-body">
          <h3>${project.title}</h3>
          <p class="muted">${project.summary}</p>
          ${techSections.length ? `<div class="tech-stack">${techSections.join('')}</div>` : ''}
          ${project.link ? `<a class="btn ghost small" href="${project.link}" target="_blank" rel="noopener">View project</a>` : ''}
        </div>
      `;
      projectGrid.appendChild(card);
    });

    const yearEl = document.getElementById('year');
    if (yearEl) yearEl.textContent = new Date().getFullYear();
  </script>
</body>

</html>
